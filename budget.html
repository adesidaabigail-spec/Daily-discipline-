<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget 2026"/>
<title>💷 Budget 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#07060a;--s1:#100e14;--s2:#16131c;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--tx:#f0ece8;--mu:#5a5068;--or:#fb923c;--or2:#f97316;--or3:#fdba74;--gr:#34d399;--re:#f87171;--am:#fbbf24;--bl:#60a5fa;--vi:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 35% at 15% 0%,rgba(251,146,60,.07),transparent 55%),radial-gradient(ellipse 45% 28% at 88% 100%,rgba(249,115,22,.04),transparent 55%);pointer-events:none;z-index:0;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;}
input,select{font-family:'DM Sans',sans-serif;outline:none;}
select option{background:#100e14;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pi{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
.fi{animation:fi .3s ease forwards;}
#hdr{background:rgba(7,6,10,.97);border-bottom:1px solid var(--bd);padding:env(safe-area-inset-top,18px) 16px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.title{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,#f0ece8 0%,var(--or) 55%,var(--or3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.vtabs{display:flex;gap:2px;background:rgba(255,255,255,0.04);padding:3px;border-radius:16px;border:1px solid var(--bd);}
.vbtn{padding:5px 10px;border-radius:13px;font-size:11px;font-weight:700;color:var(--mu);background:transparent;transition:all .2s;}
.vbtn.on{background:var(--or);color:#07060a;}
.mtabs{display:flex;gap:3px;overflow-x:auto;margin-top:10px;scrollbar-width:none;padding-bottom:2px;}
.mtabs::-webkit-scrollbar{display:none;}
.mtab{padding:5px 11px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:all .2s;color:var(--mu);}
.mtab.on{background:var(--or);color:#07060a;}
.mtab.live{color:var(--tx);}
#main{max-width:960px;margin:0 auto;padding:14px 13px 90px;position:relative;z-index:1;}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px;}
@media(min-width:580px){.sgrid{grid-template-columns:repeat(4,1fr);}}
.scard{background:var(--s1);border-radius:13px;padding:13px;border:1px solid var(--bd);overflow:hidden;position:relative;}
.sg{position:absolute;top:-24px;right:-24px;width:72px;height:72px;border-radius:50%;opacity:.08;}
.slabel{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.sval{font-size:20px;font-weight:800;letter-spacing:-.5px;}
.ssub{font-size:9px;margin-top:2px;font-weight:600;color:var(--mu);}
.ibar-wrap{background:var(--s1);border-radius:13px;border:1px solid var(--bd);padding:13px;margin-bottom:14px;}
.ibar-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:9px;}
.ibar{height:9px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;display:flex;}
.ibar-seg{height:100%;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.ibar-legend{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap;}
.ibar-li{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--mu);}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cgrid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:14px;}
@media(min-width:680px){.cgrid{grid-template-columns:1fr 1fr;}}
.ccard{background:var(--s1);border-radius:13px;padding:14px;border:1px solid var(--bd);}
.ctitle{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:12px;}
.cwrap{position:relative;height:190px;}
.cwrap-lg{position:relative;height:220px;}
.bsec{background:var(--s1);border-radius:13px;border:1px solid var(--bd);overflow:hidden;margin-bottom:10px;}
.bsec-hdr{padding:10px 13px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s;}
.bsec-hdr:hover{background:rgba(255,255,255,0.02);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.chev{font-size:10px;transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.brows{display:none;}
.brows.open{display:block;}
.brow{display:grid;grid-template-columns:1fr 80px 80px 80px 30px;border-top:1px solid rgba(255,255,255,0.025);}
.brow.tot{background:rgba(255,255,255,0.025);font-weight:700;}
.brow.colhdr{background:rgba(255,255,255,0.018);border-top:none;}
.bc{padding:8px 11px;font-size:11px;display:flex;align-items:center;}
.bc.r{justify-content:flex-end;font-variant-numeric:tabular-nums;}
.bc.tap{cursor:pointer;transition:background .15s;}
.bc.tap:hover,.bc.tap:active{background:rgba(251,146,60,.1);}
.bc-name{color:#ccc4b8;font-weight:500;}
.chk{color:var(--gr);font-size:10px;margin-left:3px;}
.note-txt{font-size:9px;color:var(--mu);margin-left:5px;font-style:italic;}
.del-btn{opacity:0;background:rgba(248,113,113,.12);color:var(--re);border:none;border-radius:4px;font-size:9px;cursor:pointer;padding:2px 5px;width:22px;transition:opacity .15s;}
.brow:hover .del-btn{opacity:1;}
.pos{color:var(--gr);}
.neg{color:var(--re);}
.neu{color:var(--mu);}
.add-row{padding:8px 11px;border-top:1px solid rgba(255,255,255,0.025);display:flex;gap:7px;align-items:center;}
.add-inp{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:6px 10px;color:var(--tx);font-size:11px;}
.add-inp::placeholder{color:var(--mu);}
.add-inp:focus{border-color:var(--or);}
.add-btn-sm{background:rgba(251,146,60,.15);color:var(--or);border:1px solid rgba(251,146,60,.3);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:700;white-space:nowrap;}
.moverlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);align-items:flex-end;justify-content:center;padding:0;}
.moverlay.open{display:flex;animation:fi .2s ease;}
.mbox{background:linear-gradient(180deg,#16121e,#0d0a14);border:1px solid var(--bd2);border-radius:20px 20px 0 0;padding:22px 20px calc(env(safe-area-inset-bottom,0px) + 20px);width:100%;max-width:520px;animation:pi .22s ease;box-shadow:0 -10px 60px rgba(0,0,0,.8);}
.drag-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 16px;}
.mtitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:16px;color:var(--or);}
.mfield{margin-bottom:12px;}
.mlabel{font-size:9px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.minput{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--bd2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:14px;}
.minput:focus{border-color:var(--or);outline:none;}
.macts{display:flex;gap:7px;margin-top:16px;}
.mbtn-ok{flex:1;padding:11px;border-radius:10px;background:linear-gradient(135deg,var(--or),var(--or2));color:#07060a;font-size:13px;font-weight:800;}
.mbtn-no{padding:11px 16px;border-radius:10px;background:rgba(255,255,255,0.06);color:var(--mu);font-size:13px;border:1px solid var(--bd);}
.upwrap{background:var(--s1);border-radius:13px;border:1px solid rgba(251,146,60,.2);padding:13px;margin-bottom:12px;}
.uptitle{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--or);margin-bottom:10px;display:flex;justify-content:space-between;}
.uprow{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--bd);}
.uprow:first-of-type{border-top:none;padding-top:0;}
.upcheck{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;flex-shrink:0;}
.upcheck.paid{background:var(--gr);border-color:var(--gr);color:#07060a;}
.upname{flex:1;font-size:11px;font-weight:500;}
.upamt{font-size:12px;font-weight:800;color:var(--or);}
.yt{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:13px;border:1px solid var(--bd);background:var(--s1);margin-bottom:12px;}
.yt table{width:100%;border-collapse:collapse;font-size:10px;min-width:760px;}
.yt th{padding:7px 9px;text-align:right;font-weight:800;font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);white-space:nowrap;background:var(--s2);}
.yt th:first-child{text-align:left;min-width:160px;}
.yt td{padding:7px 9px;text-align:right;border-top:1px solid rgba(255,255,255,0.022);white-space:nowrap;}
.yt td:first-child{text-align:left;color:#ccc4b8;font-weight:500;}
.yt tr.sh-row td{background:rgba(255,255,255,.02);font-weight:800;font-size:9px;text-transform:uppercase;color:var(--mu);padding:5px 9px;}
.yt tr.tot-row td{font-weight:800;background:rgba(255,255,255,.014);}
.yt tr.summary-row td{background:rgba(251,146,60,.04);font-weight:700;font-size:11px;border-top:2px solid rgba(251,146,60,.15);}
.yt tr.net-row td{background:rgba(251,191,36,.06);font-weight:800;font-size:11px;border-top:2px solid rgba(251,191,36,.2);}
.add-cat-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:13px;background:rgba(251,146,60,.08);border:1px dashed rgba(251,146,60,.3);color:var(--or);font-size:12px;font-weight:700;margin-bottom:10px;transition:all .2s;}
.delcat-btn{font-size:8px;padding:2px 6px;border-radius:4px;background:rgba(248,113,113,.1);color:var(--re);border:1px solid rgba(248,113,113,.2);cursor:pointer;opacity:.4;}
.delcat-btn:hover{opacity:1;}
@media(min-width:768px){
  #hdr{padding-left:20px;padding-right:20px;}
  #main{padding:16px 20px 90px;}
  .title{font-size:26px;}
  .moverlay{align-items:center;padding:20px;}
  .mbox{border-radius:18px;padding:24px;}
  .brow{grid-template-columns:1fr 88px 88px 88px 30px;}
}
</style>
</head>
<body>

<!-- EDIT MODAL -->

<div class="moverlay" id="edit-modal">
  <div class="mbox">
    <div class="drag-handle"></div>
    <div class="mtitle" id="edit-title">Edit Entry</div>
    <div class="mfield"><div class="mlabel">Budgeted (£)</div><input class="minput" id="e-bgt" type="number" min="0" step="0.01" placeholder="0.00" inputmode="decimal"/></div>
    <div class="mfield"><div class="mlabel">Actual (£)</div><input class="minput" id="e-act" type="number" min="0" step="0.01" placeholder="0.00" inputmode="decimal"/></div>
    <div class="mfield"><div class="mlabel">Notes</div><input class="minput" id="e-notes" placeholder="Optional…"/></div>
    <div class="mfield" style="display:flex;align-items:center;gap:10px;">
      <input type="checkbox" id="e-paid" style="width:16px;height:16px;accent-color:var(--or);cursor:pointer;"/>
      <label for="e-paid" style="font-size:12px;color:var(--mu);cursor:pointer;font-weight:600;">Mark as paid ✓</label>
    </div>
    <div class="macts">
      <button class="mbtn-ok" id="e-save">Save</button>
      <button class="mbtn-no" id="e-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ADD CATEGORY MODAL -->

<div class="moverlay" id="cat-modal">
  <div class="mbox">
    <div class="drag-handle"></div>
    <div class="mtitle">＋ Add Category</div>
    <div class="mfield"><div class="mlabel">Category Name</div><input class="minput" id="nc-name" placeholder="e.g. Subscriptions"/></div>
    <div class="mfield">
      <div class="mlabel">Colour</div>
      <select class="minput" id="nc-color">
        <option value="#fb923c">🟠 Orange</option><option value="#34d399">🟢 Emerald</option>
        <option value="#60a5fa">🔵 Blue</option><option value="#f87171">🔴 Red</option>
        <option value="#fbbf24">🟡 Amber</option><option value="#a78bfa">🟣 Violet</option>
        <option value="#f472b6">🩷 Pink</option><option value="#22d3ee">🩵 Cyan</option>
        <option value="#4ade80">🍏 Green</option><option value="#94a3b8">⚪ Slate</option>
      </select>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="nc-income" style="width:15px;height:15px;accent-color:var(--or);cursor:pointer;"/>
        <label for="nc-income" style="font-size:11px;color:var(--mu);cursor:pointer;font-weight:600;">Income category</label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="nc-savings" style="width:15px;height:15px;accent-color:var(--or);cursor:pointer;"/>
        <label for="nc-savings" style="font-size:11px;color:var(--mu);cursor:pointer;font-weight:600;">Savings category</label>
      </div>
    </div>
    <div class="macts">
      <button class="mbtn-ok" id="nc-save">Add Category</button>
      <button class="mbtn-no" id="nc-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- HEADER -->

<div id="hdr">
  <div class="hdr-row">
    <div class="title">💷 Budget 2026</div>
    <div class="vtabs">
      <button class="vbtn on" data-v="month">Month</button>
      <button class="vbtn" data-v="year">Year</button>
      <button class="vbtn" data-v="charts">Charts</button>
    </div>
  </div>
  <div class="mtabs" id="mtabs"></div>
</div>

<div id="main"><div id="content" class="fi"></div></div>

<script>
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MF=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ══════════════════════════════════════════════
//  CATEGORIES — tailored to your actual spending
// ══════════════════════════════════════════════
const DEFAULT_CATS = [
  {id:'income',    label:'INCOME',                color:'#34d399', income:true,
   items:['Salary (Net)','Side Income']},
  {id:'savings',   label:'SAVINGS & INVESTMENTS', color:'#818cf8', savings:true,

// ══════════════════════════════════════════════
//  PRE-FILLED DATA from your Notion screenshots

// Format: itemLabel -> [budgeted, actual]
// Using actual = budgeted since these are your planned figures
const PREFILL = {
  Mar:{

// ══════════════════════════════════════════════
//  LOAD / SEED STATE
// ══════════════════════════════════════════════
function buildFreshState(){
  const cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
  cats.forEach(cat=>{
    cat.items = cat.items.map((label,i)=>({id:cat.id+'_i'+i, label}));
  });
  // Build data from prefill
  const data={};
  MO.forEach(m=>{
    data[m]={};
    const pf = PREFILL[m]||{};
    cats.forEach(cat=>{
      cat.items.forEach(item=>{
        const v = pf[item.label];
        if(v) data[m][item.id]={b:v[0], a:v[1], paid:false, notes:''};
      });
    });
  });
  return{cats, data, openSec:{}};
}

let ST=(()=>{
  try{
    const raw=localStorage.getItem('bgt26_v4');
    if(raw){const p=JSON.parse(raw);MO.forEach(m=>{if(!p.data[m])p.data[m]={};});return p;}
  }catch(e){}
  return buildFreshState();
})();

function persist(){localStorage.setItem('bgt26_v4',JSON.stringify(ST));}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function gv(m,id,f){return ST.data[m]?.[id]?.[f]||0;}
function sv(m,id,f,v){if(!ST.data[m])ST.data[m]={};if(!ST.data[m][id])ST.data[m][id]={b:0,a:0,paid:false,notes:''};ST.data[m][id][f]=v;persist();}
function catSum(m,cid,f){const c=ST.cats.find(x=>x.id===cid);return c?c.items.reduce((s,i)=>s+gv(m,i.id,f),0):0;}
function mTot(m){
  const inC=ST.cats.filter(c=>c.income),savC=ST.cats.filter(c=>c.savings),expC=ST.cats.filter(c=>!c.income&&!c.savings);
  const ib=inC.reduce((s,c)=>s+catSum(m,c.id,'b'),0),ia=inC.reduce((s,c)=>s+catSum(m,c.id,'a'),0);
  const eb=expC.reduce((s,c)=>s+catSum(m,c.id,'b'),0),ea=expC.reduce((s,c)=>s+catSum(m,c.id,'a'),0);
  const sb=savC.reduce((s,c)=>s+catSum(m,c.id,'b'),0),sa=savC.reduce((s,c)=>s+catSum(m,c.id,'a'),0);
  return{ib,ia,eb,ea,sb,sa,nb:ib-eb-sb,na:ia-ea-sa};
}
function hasData(m){return ST.cats.some(c=>c.items.some(i=>gv(m,i.id,'b')+gv(m,i.id,'a')>0));}
function uid(p){return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);}
function fmt(v){if(!v)return '—';return '£'+Math.abs(v).toLocaleString('en-GB',{maximumFractionDigits:0});}
function fmtS(v,inc){
  if(!v)return '<span class="neu">—</span>';
  const g=inc?v>0:v>0;
  return `<span class="${g?'pos':'neg'}">${v>0?'+':'−'}£${Math.abs(v).toLocaleString()}</span>`;
}

let ET=null;
function openEdit(m,id,label){
  ET={m,id};
  document.getElementById('edit-title').textContent=label;
  const d=ST.data[m]?.[id];
  document.getElementById('e-bgt').value=d?.b||'';
  document.getElementById('e-act').value=d?.a||'';
  document.getElementById('e-notes').value=d?.notes||'';
  document.getElementById('e-paid').checked=d?.paid||false;
  document.getElementById('edit-modal').classList.add('open');
  setTimeout(()=>{const i=document.getElementById('e-act');i.focus();i.select();},150);
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');ET=null;}
function saveEdit(){
  if(!ET)return;
  const{m,id}=ET;
  if(!ST.data[m])ST.data[m]={};
  if(!ST.data[m][id])ST.data[m][id]={b:0,a:0,paid:false,notes:''};
  ST.data[m][id].b=parseFloat(document.getElementById('e-bgt').value)||0;
  ST.data[m][id].a=parseFloat(document.getElementById('e-act').value)||0;
  ST.data[m][id].notes=document.getElementById('e-notes').value.trim();
  ST.data[m][id].paid=document.getElementById('e-paid').checked;
  persist();closeEdit();render();
}
document.getElementById('e-save').onclick=saveEdit;
document.getElementById('e-cancel').onclick=closeEdit;
document.getElementById('edit-modal').addEventListener('click',e=>{if(e.target===document.getElementById('edit-modal'))closeEdit();});

    {l:'Total Annual Expenses',col:'#f87171',fn:m=>ST.cats.filter(c=>!c.income&&!c.savings).reduce((s,c)=>s+catSum(m,c.id,'a'),0)},
    {l:'Total Annual Savings', col:'#818cf8',fn:m=>ST.cats.filter(c=>c.savings).reduce((s,c)=>s+catSum(m,c.id,'a'),0)},

  rows.forEach(({l,col,fn})=>{

function attachEvents(){
  document.querySelectorAll('[data-sec]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-delcat]')||e.target.classList.contains('delcat-btn'))return;
      const id=el.dataset.sec;ST.openSec[id]=(ST.openSec[id]===false)?true:false;persist();
      el.nextElementSibling.classList.toggle('open',ST.openSec[id]!==false);
      el.querySelector('.chev').classList.toggle('open',ST.openSec[id]!==false);
    });
  });
  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();openEdit(el.dataset.editm,el.dataset.edit,el.dataset.label);});
  });
  document.querySelectorAll('[data-delitem]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const iid=el.dataset.delitem,cid=el.dataset.delcat;
      const cat=ST.cats.find(c=>c.id===cid),item=cat?.items.find(i=>i.id===iid);
      if(!item||!confirm(`Remove "${item.label}"?`))return;
      cat.items=cat.items.filter(i=>i.id!==iid);
      MO.forEach(m=>{if(ST.data[m])delete ST.data[m][iid];});
      persist();render();
    });
  });
  document.querySelectorAll('[data-delcat]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const cid=el.dataset.delcat,cat=ST.cats.find(c=>c.id===cid);
      if(!cat||!confirm(`Delete "${cat.label}"?`))return;
      cat.items.forEach(item=>MO.forEach(m=>{if(ST.data[m])delete ST.data[m][item.id];}));
      ST.cats=ST.cats.filter(c=>c.id!==cid);persist();render();
    });
  });
  document.querySelectorAll('[data-addcat]').forEach(inp=>{
    const btn=inp.nextElementSibling;
    const doAdd=()=>{
      const val=inp.value.trim();if(!val)return;
      const cat=ST.cats.find(c=>c.id===inp.dataset.addcat);if(!cat)return;
      cat.items.push({id:uid(cat.id),label:val});persist();render();
    };
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doAdd();}});
    inp.addEventListener('click',e=>e.stopPropagation());
    btn?.addEventListener('click',e=>{e.stopPropagation();doAdd();});
  });
  document.querySelectorAll('[data-upid]').forEach(el=>{
    el.addEventListener('click',()=>{
      const m=el.dataset.upm,id=el.dataset.upid;
      sv(m,id,'paid',!(ST.data[m]?.[id]?.paid||false));render();
    });
  });
  document.getElementById('add-cat-btn')?.addEventListener('click',openCatModal);
}

renderTabs();
render();
</script>

</body>
</html>
